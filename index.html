<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSITS - Secure Campus Portal</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /*'login-bg.png'*/
            background: url('login-bg.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* login card transparent  (Glass Effect)*/
        .login-overlay {
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(88, 166, 255, 0.3);
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .header-logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #58a6ff;
        }

        .sub-text {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-size: 12px;
            color: #58a6ff;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 166, 255, 0.4);
        }

        .footer-info {
            margin-top: 25px;
            font-size: 11px;
            color: #484f58;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-overlay { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="login-overlay">
    <div class="header-logo">APSITS</div>
    <div class="sub-text">SECURE CAMPUS PORTAL | PRODDATUR</div>

    <form id="loginForm">
        <label>Username / ID</label>
        <input type="text" id="userId" placeholder="Enter your ID" required>

        <label>Select Your Role</label>
        <select id="role" required>
            <option value="">-- Choose Role --</option>
            <option value="student">STUDENT (A123...)</option>
            <option value="faculty">FACULTY (F456...)</option>
            <option value="admin">ADMIN (SUPERVISOR)</option>
            <option value="security">SECURITY (GATE)</option>
        </select>

        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <button type="button" class="login-btn" onclick="handleLogin()">Login</button>
    </form>

    <div class="footer-info">
        APSITS - Amarajivi Potti Sriramulu Institute of Technology & Science <br>
        Vision 2047 | 2-Factor Authentication Ready
    </div>
</div>

<script>
    function handleLogin() {
        const role = document.getElementById('role').value;
        const user = document.getElementById('userId').value;
        const pass = document.getElementById('password').value;

        if (!role || !user || !pass) {
            alert("Please Enter Details!");
            return;
        }

        // నిన్న మనం అనుకున్న టెస్టింగ్ లాగిన్ క్రెడెన్షియల్స్
        if (role === "admin" && user === "admin" && pass === "apsits2047") {
            window.location.href = "dashboard.html";
        } else if (role === "student" && user === "student" && pass === "apsits") {
            window.location.href = "student-dashboard.html";
        } else {
            alert("Wrong Details! Try Again.");
        }
    }
</script>

</body>
</html>
