<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSITS Portal - Proddatur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* మీ కాలేజీ ఇమేజ్ పేరు ఇక్కడ ఇవ్వండి */
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('login-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #1f6feb;
        }

        .logo {
            width: 100px;
            margin-bottom: 15px;
        }

        h2 { color: #333; margin-bottom: 5px; font-size: 22px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }

        /* Hidden Login Fields */
        #loginFields { display: none; margin-top: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            font-size: 16px;
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .main-btn:hover { background: #1557b5; }

        .footer { margin-top: 20px; font-size: 11px; color: #888; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="login-bg.jpg" alt="APSITS Logo" class="logo">
    <h2>APSITS - Proddatur</h2>
    <p>Smart Campus Management System</p>

    <button id="showLoginBtn" class="main-btn" onclick="toggleFields()">LOGIN TO PORTAL</button>

    <div id="loginFields">
        <input type="text" id="userId" placeholder="Enter User ID (admin/student)">
        <input type="password" id="password" placeholder="Password">
        <button class="main-btn" style="margin-top:10px;" onclick="handleLogin()">GO</button>
    </div>

    <div class="footer">
        APSITS - Amarajivi Potti Sriramulu Institute of Technology & Science <br>
        Vision 2047 | Secure Login
    </div>
</div>

<script>
    function toggleFields() {
        document.getElementById('showLoginBtn').style.display = 'none';
        document.getElementById('loginFields').style.display = 'block';
    }

    function handleLogin() {
        const id = document.getElementById('userId').value.toLowerCase();
        const pass = document.getElementById('password').value;

        // Smart Login Logic
        if (id === "admin" && pass === "apsits2047") {
            window.location.href = "admindashboard.html";
        } 
        else if (id === "student" && pass === "apsits") {
            window.location.href = "student-dashboard.html";
        } 
        else {
            alert("Invalid ID or Password!");
        }
    }
</script>

</body>
</html>
