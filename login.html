<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSITS Portal - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    /* ఇక్కడ మీ కొత్త ఫైల్ పేరు ఇచ్చాను */
    background: url('IMG_20260330_172904.jpg') no-repeat center center fixed;
    background-size: cover;
   }


        /* లాగిన్ కార్డ్ పారదర్శకంగా (Transparent) మార్చబడింది */
        .login-card {
            background: rgba(255, 255, 255, 0.15); /* పారదర్శకత కోసం */
            backdrop-filter: blur(10px); /* వెనుక ఇమేజ్ బ్లర్ అవ్వడానికి */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2); /* తెల్లటి బోర్డర్ */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 380px;
            text-align: center;
            color: #fff;
        }

        .login-card h2 { 
            font-size: 28px;
            margin-bottom: 25px; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2); /* ఇన్‌పుట్ బాక్స్ కూడా పారదర్శకం */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input::placeholder { color: #ddd; }
        .input-group input:focus { background: rgba(255, 255, 255, 0.3); border-color: #ff7722; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #ff7722;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 119, 34, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .login-btn:hover { background: #e66a1f; transform: scale(1.02); }

        .forgot-pass {
            margin-top: 20px;
            display: block;
            font-size: 13px;
            color: #eee;
            text-decoration: none;
        }
        .forgot-pass:hover { color: #ff7722; text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>APSITS LOGIN</h2>
    
    <div class="input-group">
        <label>ID Number</label>
        <input type="text" id="userId" placeholder="e.g. STU101 or FAC501">
    </div>
    
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="userPass" placeholder="••••••••">
    </div>
    
    <button class="login-btn" onclick="handleLogin()">Login</button>
    
    <a href="#" class="forgot-pass" onclick="forgotPassword()">Forgot Password?</a>
</div>

<script>
    // మీ వెబ్ యాప్ URL ఇక్కడ ఉంది
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz64l_eMbEHO_ZYfrGkfUTe7EIFzhis2sMncjxtn28BqArivMJToYIt6rL3ZWjnMDCY/exec";

async function handleLogin(event) {
    event.preventDefault();
    
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');

    // బటన్ స్టేటస్ మార్చడం
    loginBtn.innerText = "Verifying...";
    loginBtn.disabled = true;

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'cors', // CORS ఎర్రర్స్ రాకుండా ఉండటానికి
            body: JSON.stringify({
                username: user,
                password: pass
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // లాగిన్ సక్సెస్ అయితే సంబంధిత పేజీకి వెళ్తుంది
            // ఉదాహరణకు: hod-dashboard.html లేదా library-dashboard.html
            window.location.href = result.url; 
        } else {
            alert("⚠️ Invalid Credentials! దయచేసి వివరాలు సరిచూసుకోండి.");
            loginBtn.innerText = "Login";
            loginBtn.disabled = false;
        }
    } catch (error) {
        console.error("Login Error:", error);
        alert("❌ సర్వర్ కనెక్షన్ విఫలమైంది. మళ్ళీ ప్రయత్నించండి.");
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
  }

</script>

</body>
</html>
