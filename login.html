<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSITS | Secure Login</title>
    <style>
        :root {
            --saffron: #ff7722;
            --navy: #002147;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,33,71,0.8), rgba(0,33,71,0.8)), url('1000229094.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid var(--saffron);
        }

        .login-container h2 {
            color: var(--navy);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .login-container p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--navy);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--saffron);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #e66a1f;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>APSITS PORTAL</h2>
        <p>Enter your credentials to access your dashboard</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="e.g. hod_cse" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="loginBtn" class="login-btn">Login</button>
        </form>

        <div class="footer-text">
            © 2026 APSITS | Authorized Access Only
        </div>
    </div>

    <script>
        // Your Verified Apps Script URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz64l_eMbEHO_ZYfrGkfUTe7EIFzhis2sMncjxtn28BqArivMJToYIt6rL3ZWjnMDCY/exec";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            // UI Feedback
            loginBtn.innerText = "Authenticating...";
            loginBtn.disabled = true;

            try {
                // Using GET parameters to avoid common CORS blocks with Google Scripts
                const targetUrl = `${SCRIPT_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
                
                const response = await fetch(targetUrl);
                const result = await response.json();

                if (result.status === "success") {
                    alert("Login Successful! Redirecting...");
                    // This redirects to the URL found in your Google Sheet column D
                    window.location.href = result.url; 
                } else {
                    alert("⚠️ Access Denied: " + result.message);
                    resetButton();
                }
            } catch (error) {
                console.error("Connection Error:", error);
                alert("❌ Connection Error: Unable to reach the security server. Please check your internet.");
                resetButton();
            }
        });

        function resetButton() {
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.innerText = "Login";
            loginBtn.disabled = false;
        }
    </script>
</body>
</html>
