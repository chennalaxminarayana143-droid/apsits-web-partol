<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSITS Portal - Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            /* Background Image Setup */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('1774589807875.jpg');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .login-card h2 { color: #ff7722; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline-color: #ff7722;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ff7722;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover { background: #e66a1f; }

        .forgot-pass {
            margin-top: 15px;
            display: block;
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }
        .forgot-pass:hover { color: #ff7722; text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>APSITS LOGIN</h2>
    <div class="input-group">
        <label>Enter ID Number</label>
        <input type="text" id="userId" placeholder="e.g., STU101 or FAC501">
    </div>
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="userPass" placeholder="••••••••">
    </div>
    
    <button class="login-btn" onclick="handleLogin()">Login to Portal</button>
    
    <a href="javascript:void(0)" class="forgot-pass" onclick="forgotPassword()">Forgot Password?</a>
</div>

<script>
    function handleLogin() {
        const id = document.getElementById('userId').value.toUpperCase();
        const pass = document.getElementById('userPass').value;

        if(pass === "") {
            alert("Please enter password");
            return;
        }

        // Logical Routing based on ID Prefix
        if (id.startsWith("STU")) {
            window.location.href = "diploma-student.html"; // Student Page
        } else if (id.startsWith("FAC")) {
            window.location.href = "faculty-dashboard.html"; // Management/Faculty Page
        } else if (id.startsWith("ADM")) {
            window.location.href = "dashboard.html"; // Master Admin
        } else {
            alert("Invalid ID Number. Please check your credentials.");
        }
    }

    function forgotPassword() {
        alert("Please contact the APSITS Administrative Office or Department HOD to reset your password.");
    }
</script>

</body>
</html>
