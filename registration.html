<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSITS Student Registration</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 20px; }
        .form-container { max-width: 500px; margin: auto; background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #58a6ff; }
        label { display: block; margin-top: 15px; color: #8b949e; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 25px; }
        .btn-submit:hover { background: #2ea043; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #58a6ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>New Student Registration</h2>
    <p style="text-align: center; font-size: 12px; color: #8b949e;">APSITS Institutional Portal - Proddatur</p>
    
    <form id="regForm">
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="Enter full name" required>

        <label>Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. APSITS-2026-001" required>

        <label>Course</label>
        <select id="course" onchange="updateYears()" required>
            <option value="">-- Select Course --</option>
            <option value="Diploma">Diploma</option>
            <option value="B.tech">B.Tech</option>
        </select>

        <label>Year</label>
        <select id="year" required>
            <option value="">-- Select Year --</option>
        </select>

        <label>Semester</label>
        <select id="semester" required>
            <option value="">-- Select Semester --</option>
            <option value="1">1st Semester</option>
            <option value="2">2nd Semester</option>
        </select>

        <button type="button" class="btn-submit" onclick="submitForm()">Register Student</button>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </form>
</div>

<script>
    function updateYears() {
        const course = document.getElementById('course').value;
        const yearSelect = document.getElementById('year');
        
        // Clear old options
        yearSelect.innerHTML = '<option value="">-- Select Year --</option>';
        
        let years = [];
        if (course === "Diploma") {
            years = ["1", "2", "3"];
        } else if (course === "B.tech") {
            years = ["1", "2", "3", "4"];
        }

        years.forEach(yr => {
            let option = document.createElement("option");
            option.value = yr;
            option.text = yr + " Year";
            yearSelect.add(option);
        });
    }

    function submitForm() {
        const name = document.getElementById('studentName').value;
        if(name === "") {
            alert("Please Enter Details!");
            return;
        }
        alert("Student " + name + " Registered Successfully!");
        // Future: Save to Google Sheets or Database
    }
</script>

</body>
</html>
